name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff and pytest
        run: pip install ruff pytest

      - name: Ruff check
        run: ruff check spotify_downloader.py gui_app.py installer.py src/ tests/

      - name: Ruff format check
        run: ruff format --check spotify_downloader.py gui_app.py installer.py src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and mypy
        run: pip install -r requirements.txt mypy

      - name: Run mypy
        run: python -m mypy src/ --ignore-missing-imports

  compile:
    name: Compile (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q spotify_downloader.py gui_app.py installer.py src/

  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check TUI imports work
        run: python -c "from textual.app import App; from textual.widgets import Button, Input, Label, ProgressBar, RichLog, Select; print('All TUI imports OK')"

      - name: Check GUI imports work
        run: python -c "import customtkinter; from src.gui.app import SpotifyDownloaderGUI; print('All GUI imports OK')"

      - name: Verify TUI module loads
        run: python -c "import spotify_downloader; print('TUI module loaded OK')"

      - name: Verify GUI module loads
        run: python -c "import gui_app; print('GUI module loaded OK')"

      - name: Verify installer module loads
        run: python -c "import installer; print('Installer module loaded OK')"
