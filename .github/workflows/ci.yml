name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff and pytest
        run: pip install ruff pytest

      - name: Ruff check
        run: ruff check scripts/ spotify_downloader.py gui_app.py installer.py src/ tests/

      - name: Ruff format check
        run: ruff format --check scripts/ spotify_downloader.py gui_app.py installer.py src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-qt

      - name: Install Qt system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libgl1 libxkbcommon-x11-0

      - name: Run test suite (headless on Unix)
        shell: bash
        run: |
          if [ "${{ runner.os }}" != "Windows" ]; then
            xvfb-run -a python -m pytest tests/ -v --tb=short
          else
            python -m pytest tests/ -v --tb=short
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and mypy
        run: pip install -r requirements.txt mypy

      - name: Run mypy on all Python files
        run: python -m mypy scripts/ src/ gui_app.py installer.py --ignore-missing-imports

  compile:
    name: Compile (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q scripts/ spotify_downloader.py gui_app.py installer.py src/

  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Qt system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libgl1 libxkbcommon-x11-0

      - name: Check TUI imports work
        run: python -c "from textual.app import App; from textual.widgets import Button, Input, Label, ProgressBar, RichLog, Select; print('All TUI imports OK')"

      - name: Check GUI imports work
        run: python -c "from PySide6.QtWidgets import QApplication; from src.gui_qt.main_window import MainWindow; print('All GUI imports OK')"

      - name: Verify TUI module loads
        run: python -c "import spotify_downloader; print('TUI module loaded OK')"

      - name: Verify GUI module loads
        run: python -c "import gui_app; print('GUI module loaded OK')"

      - name: Verify installer module loads
        run: python -c "import installer; print('Installer module loaded OK')"
