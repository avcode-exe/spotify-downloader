name: Build Windows EXE

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX for compression
        run: choco install upx -y

      - name: Build with PyInstaller
        env:
          PYTHONOPTIMIZE: "2"
        run: |
          if (-not (Test-Path assets)) { New-Item -ItemType Directory -Path assets }
          python generate_icon.py
          $upxDir = ""
          if (Test-Path upx\upx.exe) { $upxDir = "upx" }
          if (-not $upxDir -and (Test-Path "C:\ProgramData\chocolatey\bin\upx.exe")) { $upxDir = "C:\ProgramData\chocolatey\bin" }
          $pyiArgs = @(
            "--noconfirm"
            "--clean"
            "--name", "SpotifyDownloader"
            "--add-data", "src;src"
            "--exclude-module", "numpy"
            "--exclude-module", "scipy"
            "--exclude-module", "sklearn"
            "--exclude-module", "pandas"
            "--exclude-module", "matplotlib"
            "--exclude-module", "IPython"
            "--exclude-module", "jupyter"
            "--exclude-module", "pytest"
            "--exclude-module", "mypy"
            "--exclude-module", "ruff"
            "-s"
            "-w"
          )
          if ($upxDir) { $pyiArgs += @("--upx-dir", $upxDir) }
          $pyiArgs += "gui_app.py"
          pyinstaller @pyiArgs

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyDownloader-win-${{ matrix.python-version }}
          path: dist/SpotifyDownloader/
          retention-days: 30
